<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KiroPlyr — Sign In</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #09090b;
      --card:      #0f0f11;
      --border:    #27272a;
      --input-bg:  #18181b;
      --muted:     #a1a1aa;
      --fg:        #fafafa;
      --accent:    #ffffff;
      --danger:    #ef4444;
      --radius:    0.5rem;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--fg);
      display: flex;
      flex-direction: column;
    }

    /* ----- NAV ----- */
    nav {
      display: flex;
      align-items: center;
      padding: 0 2rem;
      height: 60px;
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--fg);
      text-decoration: none;
    }

    .nav-brand span { color: var(--muted); font-weight: 400; }

    /* ----- MAIN ----- */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }

    .card-header {
      margin-bottom: 1.75rem;
    }

    .card-header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }

    .card-header p {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ----- FORM ----- */
    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--fg);
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--fg);
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.6rem 0.875rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder { color: #52525b; }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #71717a;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
    }

    /* Password wrapper for toggle */
    .pw-wrap {
      position: relative;
    }

    .pw-wrap input { padding-right: 2.75rem; }

    .pw-toggle {
      position: absolute;
      top: 50%;
      right: 0.75rem;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      padding: 0;
      line-height: 1;
    }

    .pw-toggle:hover { color: var(--fg); }

    /* Remember me */
    .remember-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      margin-top: 0.25rem;
    }

    .remember-row input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .remember-row label {
      font-size: 0.82rem;
      color: var(--muted);
      margin: 0;
      cursor: pointer;
    }

    /* Submit button */
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #09090b;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.65rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: -0.01em;
    }

    .btn-primary:hover { background: #e4e4e7; }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ----- ALERT ----- */
    .alert {
      font-size: 0.82rem;
      padding: 0.65rem 0.875rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      display: none;
    }

    .alert.error {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    .alert.success {
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
    }

    .alert.show { display: block; }

    /* ----- DIVIDER ----- */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    /* ----- FOOTER LINKS ----- */
    .card-footer {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .card-footer a {
      color: var(--fg);
      font-weight: 500;
      text-decoration: none;
    }

    .card-footer a:hover { text-decoration: underline; }

    /* Loading spinner inside button */
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* ----- PAGE FOOTER ----- */
    footer {
      padding: 1.25rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
      justify-content: center;
    }

    footer a {
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
    }

    footer a:hover { color: var(--fg); }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-brand">Kiro<span>Plyr</span></a>
  </nav>

  <main>
    <div class="card">

      <div class="card-header">
        <h1>Sign in</h1>
        <p>Welcome back. Enter your credentials to continue.</p>
      </div>

      <div id="alert" class="alert"></div>

      <form id="loginForm" autocomplete="off" novalidate>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
              <!-- Eye icon (show) -->
              <svg id="eyeShow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <!-- Eye-off icon (hide) - hidden by default -->
              <svg id="eyeHide" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <div class="remember-row">
          <input type="checkbox" id="remember" checked />
          <label for="remember">Remember me</label>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">Sign in</button>

      </form>

      <div class="divider"></div>

      <div class="card-footer">
        <p><a href="#">Forgot password?</a></p>
      </div>

    </div>
  </main>

  <footer>
    <a href="#">FAQ</a>
    <a href="#">Help Center</a>
    <a href="#">Terms of Use</a>
    <a href="#">Privacy</a>
  </footer>

  <script>
    const API_BASE = 'https://kiroplyr.onrender.com';

    // Redirect if already logged in
    if (localStorage.getItem('kiro_token')) {
      window.location.replace('index.html');
    }

    // Password toggle
    const pwToggle = document.getElementById('pwToggle');
    const pwInput  = document.getElementById('password');
    const eyeShow  = document.getElementById('eyeShow');
    const eyeHide  = document.getElementById('eyeHide');

    pwToggle.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type = isHidden ? 'text' : 'password';
      eyeShow.style.display = isHidden ? 'none' : '';
      eyeHide.style.display = isHidden ? ''     : 'none';
    });

    // Alert helper
    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `alert ${type} show`;
    }

    function hideAlert() {
      document.getElementById('alert').className = 'alert';
    }

    // Form submit
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      const btn = document.getElementById('submitBtn');

      if (!username || !password) {
        showAlert('Please fill in all fields.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="btn-spinner"></span>Signing in…';

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Invalid credentials.');
        }

        const token    = data.data?.token    || data.token;
        const uname    = data.data?.username || data.username;

        if (remember) {
          localStorage.setItem('kiro_token', token);
          localStorage.setItem('kiro_username', uname);
        } else {
          sessionStorage.setItem('kiro_token', token);
          sessionStorage.setItem('kiro_username', uname);
        }

        showAlert('Login successful! Redirecting…', 'success');
        setTimeout(() => window.location.replace('index.html'), 700);

      } catch (err) {
        showAlert(err.message || 'Connection error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>

</body>
</html>
