<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KiroPlyr</title>

  <!-- Vidstack 1.x CDN styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vidstack@1.12.12/player/styles/base.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vidstack@1.12.12/player/styles/default/theme.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vidstack@1.12.12/player/styles/default/layouts/video.css" />

  <!-- Vidstack 1.x CDN bundle — registers all custom elements -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/vidstack@1.12.12/cdn/prod.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000; overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    #app {
      position: relative; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Loader ── */
    #loader {
      position: absolute; inset: 0; z-index: 20; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      transition: opacity 0.4s ease;
    }
    #loader.out { opacity: 0; pointer-events: none; }

    .ring {
      width: 38px; height: 38px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: rgba(255,255,255,0.7);
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loader-text {
      font-size: 0.72rem; color: rgba(255,255,255,0.3);
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* ── Error ── */
    #err {
      display: none; position: absolute; inset: 0; z-index: 30;
      background: #060606; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; text-align: center; padding: 32px;
    }
    #err.show { display: flex; }
    .err-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      display: flex; align-items: center; justify-content: center; margin-bottom: 4px;
    }
    #err h3 { font-size: 0.9rem; font-weight: 600; color: #fafafa; margin-bottom: 4px; }
    #err-msg { font-size: 0.75rem; color: rgba(255,255,255,0.28); max-width: 300px; line-height: 1.6; word-break: break-all; }

    /* ── Player wrap ── */
    #player-wrap { width: 100%; height: 100%; opacity: 0; transition: opacity 0.4s ease; }
    #player-wrap.show { opacity: 1; }

    media-player { width: 100%; height: 100%; }
  </style>
</head>
<body>
<div id="app">

  <div id="loader">
    <div class="ring"></div>
    <span id="loader-text">Loading…</span>
  </div>

  <div id="err">
    <div class="err-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <h3>Video unavailable</h3>
    <p id="err-msg">Could not load this video.</p>
  </div>

  <!-- Player — src is set by JS after reading the URL from the path -->
  <div id="player-wrap">
    <media-player
      id="kiro-player"
      view-type="video"
      stream-type="on-demand"
      log-level="warn"
      crossorigin
      playsinline
    >
      <media-provider></media-provider>
      <media-video-layout></media-video-layout>
    </media-player>
  </div>

</div>

<script>
  const API_BASE = 'https://kiroplyr.onrender.com';

  const loaderEl   = document.getElementById('loader');
  const loaderTxt  = document.getElementById('loader-text');
  const errEl      = document.getElementById('err');
  const errMsg     = document.getElementById('err-msg');
  const playerWrap = document.getElementById('player-wrap');
  const player     = document.getElementById('kiro-player');

  function showErr(msg) {
    loaderEl.classList.add('out');
    errMsg.textContent = msg || 'Could not load this video.';
    errEl.classList.add('show');
  }

  let revealed = false;
  function showPlayer() {
    if (revealed) return;
    revealed = true;
    loaderEl.classList.add('out');
    playerWrap.classList.add('show');
  }

  function proxyUrl(url) {
    return `${API_BASE}/api/proxy?url=${encodeURIComponent(url)}`;
  }

  // Read the raw MP4 URL from ?v= query param
  // Embed URL format: /embed?v=https://ia800409.us.archive.org/.../video.mp4
  function getVideoUrl() {
    const v = new URLSearchParams(location.search).get('v');
    return v ? decodeURIComponent(v) : null;
  }

  // Get a human-readable title from the filename
  function titleFromUrl(url) {
    try {
      const part = url.split('/').pop().split('?')[0];
      return decodeURIComponent(part)
        .replace(/\.[^.]+$/, '')
        .replace(/[_\-]+/g, ' ')
        .trim() || 'KiroPlyr';
    } catch { return 'KiroPlyr'; }
  }

  async function init() {
    const videoUrl = getVideoUrl();

    if (!videoUrl || !/^https?:\/\//i.test(videoUrl)) {
      return showErr('No valid video URL found in the embed path.');
    }

    const title = titleFromUrl(videoUrl);
    document.title = `${title} — KiroPlyr`;
    loaderTxt.textContent = 'Starting player…';

    // Wait for Vidstack custom elements registered by the module script above
    await customElements.whenDefined('media-player');

    // Set proxied src directly on <media-player>
    // Vidstack 1.x reads the src attribute and starts loading immediately
    player.setAttribute('src', proxyUrl(videoUrl));
    player.setAttribute('title', title);

    // Reveal when player signals it's ready to play
    player.addEventListener('can-play',        showPlayer, { once: true });
    player.addEventListener('playing',         showPlayer, { once: true });
    player.addEventListener('loaded-metadata', showPlayer, { once: true });

    // Hard fallback — never stay stuck forever
    setTimeout(showPlayer, 10000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
</body>
</html>
