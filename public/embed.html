<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KiroPlyr</title>

  <!-- Vidstack 0.6.15 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/vidstack@0.6.15/styles/community-skin/video.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/vidstack@0.6.15/dist/cdn/prod.min.js" defer></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      color: #fff;
      font-family: 'Outfit', system-ui, sans-serif;
      overflow: hidden;
    }

    #app {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* ── Loader ── */
    #loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #000;
      z-index: 10;
      transition: opacity 0.3s ease;
    }

    #loader.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 34px;
      height: 34px;
      border: 2.5px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loader-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
    }

    /* ── Error ── */
    #error-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: absolute;
      inset: 0;
      background: #0a0a0a;
      padding: 28px;
      text-align: center;
    }

    #error-screen.show { display: flex; }

    #error-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    #error-title { font-size: 0.9rem; font-weight: 600; color: #fafafa; }

    #error-msg { font-size: 0.78rem; color: rgba(255,255,255,0.35); max-width: 260px; line-height: 1.55; }

    /* ── Player wrap ── */
    #player-wrap {
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #player-wrap.ready { opacity: 1; }

    media-player {
      width: 100%;
      height: 100%;
      --media-font-family: 'Outfit', system-ui, sans-serif;
    }
  </style>
</head>
<body>
<div id="app">

  <div id="loader">
    <div class="spinner"></div>
    <span id="loader-label">Loading…</span>
  </div>

  <div id="error-screen">
    <div id="error-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <p id="error-title">Video unavailable</p>
    <p id="error-msg">This video could not be loaded.</p>
  </div>

  <div id="player-wrap">
    <media-player id="kiro-player" playsinline>
      <media-provider></media-provider>
      <media-community-skin></media-community-skin>
    </media-player>
  </div>

</div>
<script>
  const API_BASE = 'https://kiroplyr.onrender.com';

  function getVideoId() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('id')) return params.get('id');
    const parts = window.location.pathname.split('/').filter(Boolean);
    return parts[parts.length - 1] || null;
  }

  function proxyUrl(url) {
    return `${API_BASE}/api/proxy?url=${encodeURIComponent(url)}`;
  }

  function showError(msg) {
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('error-msg').textContent = msg || 'Failed to load video.';
    document.getElementById('error-screen').classList.add('show');
  }

  async function init() {
    const id = getVideoId();
    if (!id) return showError('No video ID provided in the URL.');

    try {
      const res = await fetch(`${API_BASE}/api/videos/${id}`);
      if (!res.ok) throw new Error(`Video not found (${res.status})`);

      const json = await res.json();
      const video = json.data;
      if (!video?.url) throw new Error('Missing video source URL.');

      document.title = video.title ? `${video.title} — KiroPlyr` : 'KiroPlyr';
      document.getElementById('loader-label').textContent = 'Preparing player…';

      await customElements.whenDefined('media-player');

      const player = document.getElementById('kiro-player');
      player.setAttribute('src', proxyUrl(video.url));
      player.setAttribute('title', video.title || '');
      player.setAttribute('crossorigin', '');

      // Show player when ready
      const showPlayer = () => {
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('player-wrap').classList.add('ready');
      };

      player.addEventListener('can-play', showPlayer, { once: true });

      // Fallback: show after 5s even if event doesn't fire
      setTimeout(showPlayer, 5000);

    } catch (err) {
      console.error('[KiroPlyr]', err);
      showError(err.message || 'Unexpected error.');
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
</body>
</html>
