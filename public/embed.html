<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KiroPlyr</title>

  <!-- Vidstack 1.x styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vidstack@1/player/styles/base.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vidstack@1/player/styles/default/theme.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vidstack@1/player/styles/default/layouts/video.css" />

  <!-- Vidstack 1.x CDN bundle (registers all custom elements) -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/vidstack@1/cdn/prod.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      background: #000; overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    #app {
      position: relative; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Loader ── */
    #loader {
      position: absolute; inset: 0; z-index: 20;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      transition: opacity 0.4s ease;
    }
    #loader.out { opacity: 0; pointer-events: none; }

    .ring {
      width: 38px; height: 38px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: rgba(255,255,255,0.7);
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loader-text {
      font-size: 0.72rem; color: rgba(255,255,255,0.3);
      letter-spacing: 0.07em; text-transform: uppercase;
    }

    /* ── Error ── */
    #err {
      display: none; position: absolute; inset: 0; z-index: 30;
      background: #050505;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; text-align: center; padding: 28px;
    }
    #err.show { display: flex; }
    .err-icon {
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 6px;
    }
    #err h3 { font-size: 0.9rem; font-weight: 600; color: #fafafa; }
    #err-msg { font-size: 0.75rem; color: rgba(255,255,255,0.3); max-width: 280px; line-height: 1.6; }

    /* ── Player wrap ── */
    #player-wrap {
      width: 100%; height: 100%;
      opacity: 0; transition: opacity 0.4s ease;
    }
    #player-wrap.show { opacity: 1; }

    media-player { width: 100%; height: 100%; }
  </style>
</head>
<body>
<div id="app">

  <div id="loader">
    <div class="ring"></div>
    <span id="loader-text">Loading…</span>
  </div>

  <div id="err">
    <div class="err-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <h3>Video unavailable</h3>
    <p id="err-msg">This video could not be loaded.</p>
  </div>

  <!-- Player — src injected by JS after fetching metadata -->
  <div id="player-wrap">
    <media-player
      id="kiro-player"
      view-type="video"
      stream-type="on-demand"
      log-level="warn"
      crossorigin
      playsinline
    >
      <media-provider></media-provider>
      <media-video-layout></media-video-layout>
    </media-player>
  </div>

</div>

<script>
  const API_BASE = 'https://kiroplyr.onrender.com';

  const loaderEl  = document.getElementById('loader');
  const loaderTxt = document.getElementById('loader-text');
  const errEl     = document.getElementById('err');
  const errMsg    = document.getElementById('err-msg');
  const playerWrap = document.getElementById('player-wrap');
  const player    = document.getElementById('kiro-player');

  function showErr(msg) {
    loaderEl.classList.add('out');
    errMsg.textContent = msg || 'Failed to load video.';
    errEl.classList.add('show');
  }

  let revealed = false;
  function showPlayer() {
    if (revealed) return;
    revealed = true;
    loaderEl.classList.add('out');
    playerWrap.classList.add('show');
  }

  function proxyUrl(url) {
    return `${API_BASE}/api/proxy?url=${encodeURIComponent(url)}`;
  }

  function getId() {
    const p = new URLSearchParams(location.search);
    if (p.get('id')) return p.get('id');
    const segs = location.pathname.split('/').filter(Boolean);
    return segs[segs.length - 1] || null;
  }

  async function init() {
    const id = getId();
    if (!id) return showErr('No video ID in URL.');

    try {
      loaderTxt.textContent = 'Fetching video…';

      const res = await fetch(`${API_BASE}/api/videos/${id}`);
      if (!res.ok) throw new Error(`Video not found (${res.status})`);

      const json = await res.json();
      const video = json.data;
      if (!video?.url) throw new Error('No video URL in response.');

      document.title = video.title ? `${video.title} — KiroPlyr` : 'KiroPlyr';
      loaderTxt.textContent = 'Starting player…';

      // Wait for Vidstack custom elements to register from the module script
      await customElements.whenDefined('media-player');

      // Set the proxied src directly on <media-player>
      // Vidstack 1.x supports this — it reads src attribute changes
      player.setAttribute('src', proxyUrl(video.url));
      if (video.title) player.setAttribute('title', video.title);

      // Reveal on first playable signal
      player.addEventListener('can-play', showPlayer, { once: true });
      player.addEventListener('playing',  showPlayer, { once: true });
      player.addEventListener('loaded-metadata', showPlayer, { once: true });

      // Hard fallback — never stay stuck forever
      setTimeout(showPlayer, 10000);

    } catch (e) {
      console.error('[KiroPlyr embed]', e);
      showErr(e.message || 'Unexpected error.');
    }
  }

  // Wait for DOM + run
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
</body>
</html>
