<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KiroPlyr</title>

  <!-- Vidstack CDN -->
  <link href="https://cdn.jsdelivr.net/npm/vidstack@0.6.15/styles/community-skin/video.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/vidstack@0.6.15/dist/cdn/prod.min.js" defer></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
    }

    #player-wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    media-player {
      width: 100%;
      height: 100%;
    }

    /* Loading state */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #09090b;
      color: #a1a1aa;
      font-size: 0.875rem;
      gap: 14px;
      z-index: 100;
      transition: opacity 0.3s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #27272a;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #error-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #09090b;
      color: #a1a1aa;
      font-size: 0.875rem;
      gap: 10px;
      text-align: center;
      padding: 1.5rem;
    }

    #error-state svg {
      color: #ef4444;
      margin-bottom: 4px;
    }

    #error-state strong {
      color: #fafafa;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<div id="player-wrap">

  <!-- Loading overlay -->
  <div id="loading">
    <div class="spinner"></div>
    <span id="loading-text">Loading video…</span>
  </div>

  <!-- Error state -->
  <div id="error-state">
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <strong>Video Not Found</strong>
    <span id="error-msg">Could not load the requested video.</span>
  </div>

  <!-- Vidstack Player (populated by JS) -->
  <media-player id="player" style="display:none;" crossorigin playsinline>
    <media-provider></media-provider>
    <media-community-skin></media-community-skin>
  </media-player>

</div>

<script>
  const API_BASE = 'https://kiroplyr.onrender.com';

  async function init() {
    // Extract video ID from path: /embed/:id
    const parts = window.location.pathname.split('/').filter(Boolean);
    const videoId = parts[parts.length - 1];

    if (!videoId || videoId === 'embed') {
      return showError('No video ID provided.');
    }

    try {
      document.getElementById('loading-text').textContent = 'Fetching video…';

      const res = await fetch(`${API_BASE}/api/videos/${videoId}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const json = await res.json();
      const video = json.data;

      if (!video || !video.url) throw new Error('Video URL missing');

      // Build proxied URL to bypass CORS on archive.org
      const proxiedSrc = `${API_BASE}/api/proxy?url=${encodeURIComponent(video.url)}`;

      const player = document.getElementById('player');
      player.setAttribute('title', video.title || 'KiroPlyr Video');
      player.setAttribute('src', proxiedSrc);

      // Show player once it's ready
      player.addEventListener('can-play', () => hideLoading(), { once: true });

      // Fallback: hide loading after 3s even if event doesn't fire
      setTimeout(hideLoading, 3000);

      player.style.display = '';
      player.load?.();

    } catch (err) {
      console.error(err);
      showError(err.message || 'Unexpected error.');
    }
  }

  function hideLoading() {
    const loading = document.getElementById('loading');
    loading.classList.add('hidden');
    setTimeout(() => loading.remove(), 350);
  }

  function showError(msg) {
    const loading = document.getElementById('loading');
    loading.style.display = 'none';
    const err = document.getElementById('error-state');
    err.style.display = 'flex';
    document.getElementById('error-msg').textContent = msg;
  }

  // Wait for custom elements to register before init
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>

</body>
</html>
